<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Quantum-Ready BMI Analysis Engine</title>
    <style>
        body {
            background-color: #000000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            line-height: 1.4;
            font-size: 14px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            border: 2px solid #00ff00;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }
        h1 {
            font-size: 1.1rem;
            border-bottom: 2px dashed #00ff00;
            padding-bottom: 10px;
            text-align: center;
            margin-top: 0;
        }
        .input-group {
            margin-bottom: 12px;
        }
        label {
            display: inline-block;
            width: 140px;
            color: #00aa00;
        }
        input {
            background-color: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 6px;
            width: calc(100% - 160px);
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
        }
        button {
            background-color: #00ff00;
            color: #000;
            border: none;
            padding: 12px 0;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            margin-top: 10px;
            text-transform: uppercase;
        }
        button:hover {
            background-color: #00cc00;
        }
        button:disabled {
            background-color: #004400;
            color: #00aa00;
            cursor: not-allowed;
        }
        #console-output {
            margin-top: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            min-height: 250px;
            border: 1px solid #004400;
            padding: 12px;
            background-color: #050505;
            font-size: 0.9rem;
        }
        .cursor {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .disclaimer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #008800;
            text-align: center;
            border-top: 1px solid #004400;
            padding-top: 10px;
        }
        .privacy-notice {
            margin-top: 15px;
            padding: 10px;
            border: 1px dashed #006600;
            color: #00cc00;
            text-align: left;
        }
        /* 追加：ハイライト用のテキストカラー */
        .color-warning { color: #ffaa00; }
        .color-critical { color: #ff3333; }
        .color-info { color: #00ffff; }
    </style>
</head>
<body>

<div class="container">
    <h1>[Q-MATRIX BMI ANALYZER v13.0.0]</h1>
    
    <div class="input-group">
        <label for="height">BIOMETRIC (H)[cm]:</label>
        <input type="number" id="height" step="0.1" placeholder="ENTER CM">
    </div>
    <div class="input-group">
        <label for="weight">BIOMETRIC (W)[kg]:</label>
        <input type="number" id="weight" step="0.1" placeholder="ENTER KG">
    </div>
    
    <button id="calc-btn" onclick="executeSystem()">[ INIT_ANALYSIS_SEQUENCE ]</button>

    <div id="console-output">SYSTEM_READY<span class="cursor">_</span></div>

    <div class="disclaimer">
        ⚠️ [WARN] THIS_SYSTEM_IS_FOR_APRIL_FOOLS_ONLY.<br>
        ULTRA_HIGH_COMPUTATIONAL_WASTE_IMPLEMENTED.<br>
        FINAL_CALCULATION_IS_A_SIMPLE_DIVISION.
        
        <div class="privacy-notice">
            <strong>【セキュリティ・プライバシー保護方針】</strong><br>
            本システムに入力された生体データは、すべてご使用の端末内でローカル処理されます。外部サーバーへの保存や第三者への提供は物理的・技術的に一切ありません。
        </div>
    </div>
</div>

<script>
    const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    const terminal = document.getElementById('console-output');

    // HTMLタグを含めて出力できるように修正
    async function printToConsole(text, speed = 15) {
        // タグのパースを避けるため、一文字ずつの表示処理を簡易的なDOM操作に変更
        terminal.innerHTML = terminal.innerHTML.replace('<span class="cursor">_</span>', '');
        
        let tempHtml = terminal.innerHTML;
        let isTag = false;
        let buffer = "";

        for (let i = 0; i < text.length; i++) {
            let char = text.charAt(i);
            
            if (char === '<') isTag = true;
            
            if (isTag) {
                buffer += char;
                if (char === '>') {
                    isTag = false;
                    tempHtml += buffer;
                    terminal.innerHTML = tempHtml + '<span class="cursor">_</span>';
                    buffer = "";
                }
            } else {
                tempHtml += char;
                terminal.innerHTML = tempHtml + '<span class="cursor">_</span>';
                await delay(speed);
            }
        }
        terminal.scrollTop = terminal.scrollHeight;
    }

    async function clearConsole() {
        terminal.innerHTML = 'ANALYSIS_INITIATED...<span class="cursor">_</span>\n';
    }

    class QuantumComponent {
        constructor(name) {
            this.name = name;
            this.encoder = new TextEncoder();
        }
        
        async _forceComputationalWaste(value) {
            await printToConsole(`  - [CALC_WASTE] ${this.name}: ハッシュループ演算を開始...\n`, 5);
            const data = this.encoder.encode(value.toString() + Math.random());
            for(let i=0; i<500; i++) { // 体感速度向上のためループを少し減らしました
                await crypto.subtle.digest('SHA-256', data);
            }
            await printToConsole(`  - [CALC_WASTE] ${this.name}: ${value.toString().substring(0,4)}... [OK]\n`, 5);
        }
    }

    class HeightDeconstructor extends QuantumComponent {
        constructor() { super('Height'); }
        async deconstruct(cm) {
            if (cm <= 0 || isNaN(cm)) throw new Error("INVALID_BIOMETRIC_DATA: HEIGHT");
            await printToConsole(`> [HeightDeconstructor] 身長データの量子デコンストラクション中...\n`);
            
            const radians = (cm * Math.PI) / 180;
            const sine_term = Math.sin(radians);
            const cosine_term = Math.cos(radians);
            const normalization_variance = Math.sqrt(Math.pow(sine_term, 2) + Math.pow(cosine_term, 2));
            
            await this._forceComputationalWaste(cm);
            return (cm / 100.0) * normalization_variance;
        }
    }

    class WeightHashValidator extends QuantumComponent {
        constructor() { super('Weight'); }
        async validate(kg) {
            if (kg <= 0 || isNaN(kg)) throw new Error("INVALID_BIOMETRIC_DATA: WEIGHT");
            await printToConsole(`> [WeightHashValidator] 体重データのブロックチェーン整合性チェック...\n`);
            
            await this._forceComputationalWaste(kg);
            return kg;
        }
    }

    // --- BMI評価・アドバイス生成ロジック ---
    function getAssessmentData(bmi) {
        if (bmi < 18.5) {
            return {
                tease: "<span class='color-info'>[SYSTEM_ALERT] 警告: 重力への定着力が不足しています。強風による吹き飛ばしリスクを検知。存在感が希薄です。</span>",
                advice: "【医学的推奨 (痩せすぎ)】\nエネルギーとタンパク質の摂取量が不足しています。厚生労働省の「日本人の食事摂取基準」に基づき、主食・主菜・副菜を揃えた食事を意識し、1日の総カロリーを適正に増やしてください。消化に良い炭水化物と、良質なタンパク質（肉、魚、卵、大豆製品）の摂取が重要です。"
            };
        } else if (bmi >= 18.5 && bmi < 25) {
            return {
                tease: "<span class='color-info'>[SYSTEM_ERROR] エラー: 異常なほど正常です。当システムはあなたのような平凡で健康的な数値を処理するために作られたわけではありません。</span>",
                advice: "【医学的推奨 (普通体重)】\n現在の体重は医学的に最も疾患リスクが低い「標準体重」の範囲内です。現在のPFCバランス（タンパク質・脂質・炭水化物）を維持し、適度な運動を継続してください。特段の食事制限は不要です。"
            };
        } else if (bmi >= 25 && bmi < 30) {
            return {
                tease: "<span class='color-warning'>[SYSTEM_WARN] 検知: 質量保存の法則を過剰に体現しています。地球の自転速度に影響を与える前に介入が必要です。</span>",
                advice: "【医学的推奨 (肥満1度)】\n日本肥満学会の基準では「肥満（1度）」に分類されます。脂質と糖質の過剰摂取を控え、食物繊維（野菜、海藻、きのこ類）から先に食べる「ベジファースト」を導入し、食後の血糖値急上昇を抑えるアプローチが推奨されます。総摂取カロリーの見直しを行ってください。"
            };
        } else {
            return {
                tease: "<span class='color-critical'>[CRITICAL_WARN] 致命的警告: 局所的な重力異常、およびブラックホール形成の初期段階を観測。直ちに事象の地平面から離脱してください。</span>",
                advice: "【医学的推奨 (肥満2度以上)】\n「肥満（2度以上）」の領域であり、高血圧や糖代謝異常などの生活習慣病リスクが有意に上昇しています。自己流の極端なカロリー制限は避け、医療機関や管理栄養士の指導のもと、医学的根拠に基づいた持続可能な食事・運動療法を開始することを強く推奨します。"
            };
        }
    }

    async function executeSystem() {
        const heightInput = parseFloat(document.getElementById('height').value);
        const weightInput = parseFloat(document.getElementById('weight').value);
        const btn = document.getElementById('calc-btn');

        btn.disabled = true;
        await clearConsole();

        try {
            await printToConsole("> [BOOT] Q-Matrix カーネル v13.0.0 をロード中...\n", 5);
            const hDecon = new HeightDeconstructor();
            const wHashV = new WeightHashValidator();
            
            const h_m = await hDecon.deconstruct(heightInput);
            const w_kg = await wHashV.validate(weightInput);
            
            await printToConsole("> [ANALYSIS] 最終的な指数算出プロセスを開始...\n", 10);
            await delay(800);

            const bmi = w_kg / Math.pow(h_m, 2);
            const assessment = getAssessmentData(bmi);
            
            const separator = "========================================\n";
            await printToConsole(separator, 5);
            await printToConsole(`> 【量子診断結果】\n`, 10);
            await printToConsole(`> 算出されたBMI指標 (Q-Standard): ${bmi.toFixed(2)}\n`, 15);
            await printToConsole(separator, 5);
            
            await delay(500);
            await printToConsole(`\n${assessment.tease}\n\n`, 10);
            await delay(800);
            await printToConsole(`${assessment.advice}\n\n`, 5);
            
            await printToConsole("> [EXIT] プロセス正常終了。量子セッションを破棄しました。\n", 10);

        } catch (error) {
            await printToConsole(`\n<span class="color-critical">[CRITICAL_ERROR] ${error.message}</span>\n`, 5);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
